<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact Us · AI Tools Playbook</title>
<meta name="description" content="Contact Traininglobe about the AI Tools Playbook." />
<style>
:root{--bg:#f7f4ef;--ink:#1c1a17;--muted:#5c564e;--card:#fffdf9;--line:#e4ddd2;--accent:#0f6b5c;--accent-soft:#d8efe9;--shadow:0 10px 30px rgba(28,26,23,.06);--max:820px}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;color:var(--ink);background:radial-gradient(1200px 500px at 10% -10%,#e7f3ef 0%,transparent 55%),radial-gradient(900px 400px at 100% 0%,#f3ebe0 0%,transparent 50%),var(--bg);line-height:1.65}
.wrap{max-width:calc(var(--max) + 280px);margin:0 auto;padding:2rem 1.25rem 4rem;display:grid;grid-template-columns:240px 1fr;gap:2rem}
@media(max-width:900px){.wrap{grid-template-columns:1fr}.toc{position:static!important}}
header.hero{grid-column:1/-1;background:linear-gradient(135deg,#123c34,#0f6b5c 55%,#2f8f7a);color:#f6fffc;border-radius:18px;padding:1.7rem 2rem;box-shadow:var(--shadow);display:flex;align-items:center;gap:2rem}
.brand-logo{display:block;width:min(320px,42%);height:auto;padding:.65rem 1rem;background:#fff;border-radius:14px;box-shadow:0 8px 22px rgba(0,0,0,.14)}
.hero-copy{min-width:0}
header.hero h1{margin:0 0 .6rem;font-size:clamp(1.8rem,4vw,2.6rem);letter-spacing:-.02em}
header.hero p{margin:0;max-width:62ch;opacity:.95;font-size:1.05rem}
.toc{position:sticky;top:1rem;align-self:start;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1rem;box-shadow:var(--shadow);max-height:calc(100vh - 2rem);overflow:auto}
.toc h2{margin:0 0 .6rem;font-size:.95rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-family:ui-sans-serif,system-ui,sans-serif}
.toc-topics{list-style:none;padding:0;margin:0}
.toc-topic{margin:.2rem 0;font-family:ui-sans-serif,system-ui,sans-serif;font-size:.9rem}
.toc-link{display:block;padding:.55rem .45rem;border-radius:8px;color:var(--ink);text-decoration:none}
.toc-link:hover{background:#eef7f4;color:var(--accent)}
.toc-contact{margin-top:.85rem;padding-top:.75rem;border-top:1px solid var(--line)}
.toc-contact .toc-link{font-weight:700;color:#0b584c;background:#e7f3ef}
.contact{background:linear-gradient(145deg,#fffdf9,#f1faf7);border:1px solid var(--line);border-radius:18px;padding:1.6rem 1.5rem;box-shadow:var(--shadow)}
.contact h2{margin:0 0 .35rem;color:#14352f;font-size:1.55rem}
.contact-intro{margin:0 0 1.2rem;color:var(--muted)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.field{display:flex;flex-direction:column;gap:.35rem;font-family:ui-sans-serif,system-ui,sans-serif}
.field.full{grid-column:1/-1}
.field label{font-size:.88rem;font-weight:700;color:#14352f}
.field input,.field textarea{width:100%;font:inherit;color:var(--ink);background:#fff;border:1px solid #cfc8bd;border-radius:9px;padding:.72rem .8rem;outline:none}
.field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field textarea{min-height:140px;resize:vertical}
.contact-actions{grid-column:1/-1;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.contact-submit{border:0;border-radius:9px;padding:.75rem 1.15rem;background:var(--accent);color:#fff;font:700 .95rem ui-sans-serif,system-ui,sans-serif;cursor:pointer}
.contact-submit:hover{background:#0b584c}
.contact-status{grid-column:1/-1;margin:0;padding:.75rem .9rem;border-radius:9px;background:#dff5ed;color:#0b584c;font:600 .9rem ui-sans-serif,system-ui,sans-serif}
footer{grid-column:1/-1;text-align:center;color:var(--muted);font-family:ui-sans-serif,system-ui,sans-serif;font-size:.85rem;margin-top:.5rem}
@media(max-width:900px){header.hero{align-items:flex-start;flex-direction:column;gap:1.15rem}.brand-logo{width:min(360px,100%)}.contact-grid{grid-template-columns:1fr}.field.full,.contact-actions{grid-column:1}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero">
<img class="brand-logo" src="images/traininglobe-logo.png" alt="Traininglobe" />
<div class="hero-copy">
<h1>Contact Us</h1>
<p>Send a question, suggestion, or training requirement to the Traininglobe team.</p>
</div>
</header>
<nav class="toc">
<h2>Navigate</h2>
<ul class="toc-topics">
<li class="toc-topic"><a class="toc-link" href="index.html">Back to Playbook</a></li>
<li class="toc-topic toc-contact"><a class="toc-link" href="contact.html">Contact Us</a></li>
</ul>
</nav>
<main>
<section class="contact" id="contact">
<h2>Send a message</h2>
<p class="contact-intro">Fill in the details below. Your message will be delivered to our team.</p>
<form id="contact-form" class="contact-grid" action="https://formsubmit.co/atharv.kumar@webisdom.com" method="POST">
<input type="hidden" name="_subject" value="New message from the AI Tools Playbook" />
<input type="hidden" name="_template" value="table" />
<input type="hidden" name="_captcha" value="false" />
<input type="hidden" name="_next" value="https://biswajitchatterjee98.github.io/ai-tools-playbook/contact.html?submitted=true" />
<div class="field">
<label for="contact-name">Name</label>
<input id="contact-name" name="name" type="text" autocomplete="name" required />
</div>
<div class="field">
<label for="contact-email">Email</label>
<input id="contact-email" name="email" type="email" autocomplete="email" required />
</div>
<div class="field full">
<label for="contact-subject">Subject</label>
<input id="contact-subject" name="subject" type="text" required />
</div>
<div class="field full">
<label for="contact-message">Message</label>
<textarea id="contact-message" name="message" required></textarea>
</div>
<div class="contact-actions">
<button class="contact-submit" type="submit">Send message</button>
</div>
<p id="contact-status" class="contact-status" hidden>Thank you. Your message has been sent.</p>
</form>
</section>
</main>
<footer>Traininglobe · AI Tools Playbook</footer>
</div>
<script>
if (new URLSearchParams(window.location.search).get('submitted') === 'true') {
  document.getElementById('contact-status').hidden = false;
}
</script>
</body>
</html>
